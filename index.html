                    <h3 class="section-title">💪 Key Strengths</h3>
                    ${topComps.map(([name, score]) => `
                        <div style="background: #064e3b; border-left: 4px solid #4F9262; padding: 16px; border-radius: 8px; margin-bottom: 12px;">
                            <div style="font-weight: 600; color: #4F9262; margin-bottom: 8px;">${name} (${score.toFixed(2)}/5.0)</div>
                            <div style="color: #cbd5e1; font-size: 14px; line-height: 1.6;">
                                ${name} is a key strength at ${score.toFixed(2)}/5.0 - ${score >= 4.0 ? 'excellent' : 'solid'} performance. 
                                Continue reinforcing these skills. 
                                ${trainer.stats.trend === 'improving' ? 'Showing positive growth trajectory.' : ''}
                            </div>
                        </div>
                    `).join('')}
                    
                    ${strengthComments.length > 0 ? `
                        <div style="background: #0e313e; padding: 16px; border-radius: 8px; margin-top: 12px;">
                            <div style="font-weight: 600; color: #4F9262; margin-bottom: 12px;">Observer Noted: Positive Feedback</div>
                            ${strengthComments.map(comment => `
                                <div style="margin-bottom: 12px;">
                                    <div style="color: #cbd5e1; font-style: italic; line-height: 1.6;">
                                        "${comment.text.substring(0, 150)}${comment.text.length > 150 ? '...' : ''}"
                                    </div>
                                    <div style="color: #64748b; font-size: 12px; margin-top: 4px;">
                                        ${comment.week} • ${comment.observer}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
                
                <div class="section">
                    <h3 class="section-title">🎯 Development Areas</h3>
                    ${bottomComps.map(([name, score]) => {
                        const priority = score < 3.0 ? 'HIGH' : score < 3.5 ? 'MEDIUM' : 'LOW';
                        const bgColor = priority === 'HIGH' ? '#7f1d1d' : priority === 'MEDIUM' ? '#78350f' : '#1e3a8a';
                        const borderColor = priority === 'HIGH' ? '#ef4444' : priority === 'MEDIUM' ? '#f59e0b' : '#3b82f6';
                        const textColor = priority === 'HIGH' ? '#ef4444' : priority === 'MEDIUM' ? '#fbbf24' : '#60a5fa';
                        
                        return `
                            <div style="background: ${bgColor}; border-left: 4px solid ${borderColor}; padding: 16px; border-radius: 8px; margin-bottom: 12px;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                    <div style="font-weight: 600; color: ${textColor};">${name} (${score.toFixed(2)}/5.0)</div>
                                    <span style="background: ${borderColor}; color: white; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;">
                                        ${priority}
                                    </span>
                                </div>
                                <div style="color: #cbd5e1; font-size: 14px; line-height: 1.6;">
                                    ${name} needs development at ${score.toFixed(2)}/5.0 - should be prioritized for improvement.
                                    ${trainer.stats.trend === 'declining' ? ' CONCERN: This area is declining and needs attention.' : ''}
                                </div>
                            </div>
                        `;
                    }).join('')}
                    
                    ${weaknessComments.length > 0 ? `
                        ${weaknessComments.map(comment => `
                            <div style="background: #7f1d1d; border-left: 4px solid #ef4444; padding: 16px; border-radius: 8px; margin-bottom: 12px;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                    <div style="font-weight: 600; color: #ef4444;">Recurring Issue: Development Area</div>
                                    <span style="background: #ef4444; color: white; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;">
                                        MEDIUM
                                    </span>
                                </div>
                                <div style="color: #cbd5e1; font-size: 14px; line-height: 1.6; font-style: italic;">
                                    "${comment.text.substring(0, 150)}${comment.text.length > 150 ? '...' : ''}"
                                </div>
                                <div style="color: #94a3b8; font-size: 12px; margin-top: 8px;">
                                    ${comment.week} • ${comment.observer}
                                </div>
                            </div>
                        `).join('')}
                    ` : ''}
                </div>
                
                <div class="section">
                    <h3 class="section-title">📝 Improvement Plan for Observer</h3>
                    <div style="color: #94a3b8; margin-bottom: 20px; font-size: 14px;">
                        Use this plan when coaching the trainer:
                    </div>
                    
                    ${analysis.actionPlan.map((action, i) => {
                        const isWeakest = i === 0 && bottomComps.length > 0;
                        const weakestComp = isWeakest ? bottomComps[0] : null;
                        const isSecondary = i === 1 && bottomComps.length > 1;
                        const secondComp = isSecondary ? bottomComps[1] : null;
                        const isStrength = action.toLowerCase().includes('leverage');
                        const strongestComp = isStrength && topComps.length > 0 ? topComps[0] : null;
                        
                        let priority, timeline, title, current, target;
                        
                        if (isWeakest && weakestComp) {
                            priority = 'IMMEDIATE';
                            timeline = 'Next 2 sessions';
                            title = weakestComp[0];
                            current = weakestComp[1].toFixed(2);
                            target = (parseFloat(current) + 0.5).toFixed(2);
                        } else if (isSecondary && secondComp) {
                            priority = 'SHORT-TERM';
                            timeline = 'Within 4 sessions';
                            title = secondComp[0];
                            current = secondComp[1].toFixed(2);
                            target = (parseFloat(current) + 0.5).toFixed(2);
                        } else if (isStrength && strongestComp) {
                            priority = 'LEVERAGE STRENGTH';
                            timeline = 'Ongoing';
                            title = strongestComp[0];
                            current = strongestComp[1].toFixed(2);
                            target = 'null';
                        } else if (i === analysis.actionPlan.length - 1) {
                            priority = 'COACHING APPROACH';
                            timeline = 'Next 1:1 meeting';
                            title = 'Feedback Conversation Guide';
                        } else {
                            priority = 'PATTERN TO ADDRESS';
                            timeline = 'Ongoing monitoring';
                            title = 'Development Focus';
                        }
                        
                        const priorityColor = priority === 'IMMEDIATE' ? '#ef4444' :
                                            priority === 'SHORT-TERM' ? '#f59e0b' :
                                            priority === 'LEVERAGE STRENGTH' ? '#4F9262' : '#3b82f6';
                        
                        return `
                            <div style="background: #0e313e; padding: 20px; border-radius: 8px; margin-bottom: 16px; border-left: 4px solid ${priorityColor};">
                                <div style="display: flex; align-items: start; gap: 16px;">
                                    <div style="background: ${priorityColor}; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0;">
                                        ${i + 1}
                                    </div>
                                    <div style="flex: 1;">
                                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                                            <span style="background: ${priorityColor}; color: white; padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 600;">
                                                ${priority}
                                            </span>
                                            <span style="color: #64748b; font-size: 12px;">
                                                ⏱️ ${timeline}
                                            </span>
                                        </div>
                                        
                                        <h4 style="color: #e2e8f0; font-size: 16px; margin-bottom: 8px;">${title}</h4>
                                        
                                        ${current ? `
                                            <div style="color: #94a3b8; font-size: 13px; margin-bottom: 12px;">
                                                Current: <strong style="color: ${getScoreColor(parseFloat(current)) === 'needs-support' || getScoreColor(parseFloat(current)) === 'developing' ? '#ef4444' : '#fbbf24'}">${current}/5.0</strong> 
                                                → Target: <strong style="color: #4F9262">${target}/5.0</strong>
                                            </div>
                                        ` : ''}
                                        
                                        <div style="color: #cbd5e1; font-size: 14px; margin-bottom: 12px; line-height: 1.6;">
                                            ${isWeakest ? `This is ${trainer.trainer_name}'s weakest area at ${current}/5.0, which is below target.` :
                                              isSecondary ? `Secondary development area at ${current}/5.0.` :
                                              isStrength ? `This is ${trainer.trainer_name}'s strongest area at ${current}/5.0.` :
                                              priority === 'COACHING APPROACH' ? 'Use this structure when meeting with the trainer:' :
                                              ''}
                                        </div>
                                        
                                        <div style="background: #1a2730; padding: 12px; border-radius: 6px; margin-bottom: 12px;">
                                            <div style="color: #94a3b8; font-size: 12px; font-weight: 600; margin-bottom: 8px;">ACTION STEPS:</div>
                                            <ul style="margin: 0; padding-left: 20px; color: #cbd5e1; font-size: 13px; line-height: 1.8;">
                                                ${isWeakest ? `
                                                    <li>Schedule brief check-ins with struggling youth after sessions</li>
                                                    <li>Practice asking open-ended coaching questions</li>
                                                    <li>Develop a system to track individual youth progress</li>
                                                ` : isSecondary ? `
                                                    <li>Actively monitor this competency in next observations</li>
                                                    <li>Provide specific examples and techniques</li>
                                                ` : isStrength ? `
                                                    <li>Recognize and affirm strong performance in ${title}</li>
                                                    <li>Ask trainer to share techniques with peers who struggle in this area</li>
                                                    <li>Use strength in ${title} to build confidence while working on weaker areas</li>
                                                ` : priority === 'COACHING APPROACH' ? `
                                                    <li>START POSITIVE: 'I noticed your strength in ${topComps[0] ? topComps[0][0] : 'your work'}...'</li>
                                                    <li>IDENTIFY GROWTH AREA: 'One area to develop is ${bottomComps[0] ? bottomComps[0][0] : 'this skill'}...'</li>
                                                    <li>COLLABORATE: 'What support would help you improve in this area?'</li>
                                                    <li>SET SPECIFIC GOAL: 'Let's aim for [specific target] by [specific date]'</li>
                                                    <li>SCHEDULE FOLLOW-UP: 'I'll observe again on [date] to see progress'</li>
                                                ` : `
                                                    <li>Discuss specific instances with trainer</li>
                                                    <li>Co-create a personal action plan to address this pattern</li>
                                                    <li>Monitor progress in next 2 observations</li>
                                                `}
                                            </ul>
                                        </div>
                                        
                                        ${isWeakest || isSecondary ? `
                                            <div style="background: #1e3a8a; padding: 10px 12px; border-radius: 6px; margin-bottom: 8px;">
                                                <div style="color: #60a5fa; font-size: 12px; font-weight: 600;">
                                                    💡 Coaching Tip: ${isWeakest ? 'Role-play a coaching conversation - observe how trainer responds to youth challenges' : 'Count participation by gender during observation - share the data with trainer'}
                                                </div>
                                            </div>
                                        ` : ''}
                                        
                                        <div style="color: #4F9262; font-size: 13px; font-weight: 600;">
                                            🎯 Success Metric: ${
                                                isWeakest || isSecondary ? `Achieve ${target}/5.0 in ${title}` :
                                                isStrength ? 'Maintain excellence while transferring skills to peers' :
                                                priority === 'COACHING APPROACH' ? 'Trainer leaves with clear understanding of strengths, growth areas, and action plan' :
                                                'No recurring issues noted in next 2 observations'
                                            }
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
                
                <div class="section">
                    <h3 class="section-title">✅ Observer Action Items</h3>
                    <div style="background: #0e313e; padding: 20px; border-radius: 8px;">
                        <ul style="margin: 0; padding-left: 20px; color: #cbd5e1; line-height: 2; font-size: 14px;">
                            <li>Schedule 1:1 feedback session with ${trainer.trainer_name} within the next week</li>
                            <li>Focus observation on ${bottomComps[0] ? bottomComps[0][0] : 'development areas'} in next visit</li>
                            <li>Recognize and reinforce strength in ${topComps[0] ? topComps[0][0] : 'key areas'}</li>
                            <li>Document progress on improvement plan after each observation</li>
                        </ul>
                    </div>
                </div>
            `;
        }
        
        // ==================== CLAUDE AI INTEGRATION ====================
        async function generateClaudeDeepDive(trainerId) {
            const trainer = DEMO_DATA.trainers.find(t => t.trainer_id === trainerId);
            if (!trainer) return;
            
            const container = document.getElementById('claude-insights-container');
            
            // Show loading state
            container.innerHTML = `
                <div style="background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); padding: 24px; border-radius: 12px; margin-bottom: 24px; border: 2px solid #6366f1;">
                    <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 16px;">
                        <div style="width: 48px; height: 48px; border: 4px solid #6366f1; border-top-color: #8b5cf6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
                        <div>
                            <div style="color: #e0e7ff; font-weight: 600; font-size: 16px; margin-bottom: 4px;">🤖 Claude AI is analyzing...</div>
                            <div style="color: #a5b4fc; font-size: 13px;">Reading ${trainer.stats.observation_count} observations and ${trainer.all_comments ? trainer.all_comments.length : 0} observer comments</div>
                        </div>
                    </div>
                    <style>
                        @keyframes spin { to { transform: rotate(360deg); } }
                    </style>
                </div>
            `;
            
            try {
                // Prepare data for Claude
                const prompt = `You are an expert education coach analyzing trainer performance data for the E!BA (Educate! Bootcamp Accelerator) program in Uganda.

TRAINER PROFILE:
- Name: ${trainer.trainer_name}
- Gender: ${trainer.trainer_gender}
- Site: ${trainer.training_site}
- District: ${trainer.district_name}
- Overall Score: ${trainer.stats.average_score.toFixed(2)}/5.0 (${getScoreLabel(trainer.stats.average_score)})
- Total Observations: ${trainer.stats.observation_count}
- Trend: ${trainer.stats.trend}

COMPETENCY SCORES (1-5 scale):
${Object.entries(trainer.stats.competencies).map(([name, score]) => `- ${name}: ${score.toFixed(2)}/5.0`).join('\n')}

OBSERVATION HISTORY:
${trainer.observations.map((obs, i) => `${i + 1}. ${obs.date} (${obs.week}): Score ${obs.score.toFixed(2)}/5.0 - Observer: ${obs.observer}`).join('\n')}

${trainer.all_comments && trainer.all_comments.length > 0 ? `
OBSERVER COMMENTS:
Strengths:
${trainer.all_comments.filter(c => c.type === 'strength').map(c => `- "${c.text}" (${c.week}, ${c.observer})`).join('\n')}

Areas for Development:
${trainer.all_comments.filter(c => c.type === 'weakness').map(c => `- "${c.text}" (${c.week}, ${c.observer})`).join('\n')}

General Feedback:
${trainer.all_comments.filter(c => c.type === 'overall').map(c => `- "${c.text}" (${c.week}, ${c.observer})`).join('\n')}
` : ''}

Please provide a comprehensive coaching analysis with:
1. A nuanced assessment of this trainer's performance, considering both quantitative scores and qualitative feedback
2. Specific, actionable coaching strategies tailored to this individual
3. Insights into patterns you notice across observations
4. Recommendations for the observer on how to support this trainer's development
5. Any cultural or contextual considerations for coaching in Uganda

Be specific, empathetic, and action-oriented. Focus on what the observer should DO in their next coaching session.`;

                // Call Apps Script backend with Claude API integration
                console.log('Calling Claude API via Apps Script...');
                console.log('Prompt length:', prompt.length);
                
                const response = await fetch(APPS_SCRIPT_URL + '?action=claude_analysis', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain',
                    },
                    body: prompt
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                if (!data.success || !data.analysis) {
                    throw new Error('Invalid response from server. Response: ' + JSON.stringify(data));
                }
                
                const claudeResponse = data.analysis;

                // Display Claude's insights
                container.innerHTML = `
                    <div style="background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); padding: 24px; border-radius: 12px; margin-bottom: 24px; border: 2px solid #8b5cf6; box-shadow: 0 8px 32px rgba(139, 92, 246, 0.3);">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <span style="font-size: 32px;">🤖</span>
                                <div>
                                    <div style="color: #e0e7ff; font-weight: 600; font-size: 18px;">Claude AI Deep Dive Analysis</div>
                                    <div style="color: #a5b4fc; font-size: 13px;">Personalized coaching insights for ${trainer.trainer_name}</div>
                                </div>
                            </div>
                            <button onclick="document.getElementById('claude-insights-container').innerHTML=''" 
                                    style="padding: 8px 16px; background: rgba(255,255,255,0.1); color: #e0e7ff; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; cursor: pointer; font-size: 12px;">
                                ✕ Close
                            </button>
                        </div>
                        <div style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 8px; color: #e0e7ff; line-height: 1.8; white-space: pre-wrap; font-size: 14px;">
${claudeResponse}
                        </div>
                        <div style="margin-top: 16px; padding: 12px; background: rgba(139, 92, 246, 0.2); border-radius: 6px; border-left: 4px solid #8b5cf6;">
                            <div style="color: #c4b5fd; font-size: 12px;">
                                💡 This analysis was generated by Claude AI based on ${trainer.stats.observation_count} observations and ${trainer.all_comments ? trainer.all_comments.length : 0} observer comments. Use it alongside the rule-based insights above for a comprehensive coaching approach.
                            </div>
                        </div>
                    </div>
                `;
                
            } catch (error) {
                console.error('Claude API Error:', error);
                console.error('Error details:', {
                    message: error.message,
                    stack: error.stack,
                    url: APPS_SCRIPT_URL
                });
                
                container.innerHTML = `
                    <div style="background: #7f1d1d; padding: 20px; border-radius: 12px; margin-bottom: 24px; border: 2px solid #ef4444;">
                        <div style="color: #fecaca; font-weight: 600; margin-bottom: 12px;">🔐 Claude AI Deep Dive Error</div>
                        <div style="color: #fca5a5; font-size: 14px; line-height: 1.6; margin-bottom: 12px;">
                            <p style="margin-bottom: 12px;"><strong>Error:</strong> ${error.message}</p>
                            
                            <details style="margin-bottom: 12px;">
                                <summary style="cursor: pointer; color: #fbbf24; margin-bottom: 8px;">🔍 Technical Details (click to expand)</summary>
                                <div style="background: rgba(0,0,0,0.3); padding: 12px; border-radius: 6px; font-family: monospace; font-size: 12px; margin-top: 8px; white-space: pre-wrap;">
Apps Script URL: ${APPS_SCRIPT_URL}
Error Message: ${error.message}
Error Stack: ${error.stack || 'No stack trace'}

Common Issues:
1. Apps Script not deployed with doPost() function
2. API key missing or invalid in Apps Script
3. Apps Script not set to "Anyone" access
4. New deployment not yet active (wait 1-2 minutes)
                                </div>
                            </details>
                            
                            <p style="margin-bottom: 8px;"><strong>Quick Fixes:</strong></p>
                            <ol style="margin-left: 20px; margin-bottom: 12px;">
                                <li>Check browser console (F12) for detailed error</li>
                                <li>Verify Apps Script has API key: sk-ant-api03-r2ZWn2...</li>
                                <li>Ensure Apps Script is deployed with "Execute as: Me" and "Who has access: Anyone"</li>
                                <li>Wait 1-2 minutes after deploying for changes to take effect</li>
                            </ol>
                            
                            <p style="font-size: 13px; color: #fbbf24;">💡 Meanwhile, use the rule-based insights below which work instantly without API setup.</p>
                        </div>
                        <button onclick="document.getElementById('claude-insights-container').innerHTML=''" 
                                style="margin-top: 12px; padding: 8px 16px; background: rgba(255,255,255,0.1); color: #fecaca; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; cursor: pointer; font-size: 12px;">
                            Close
                        </button>
                    </div>
                `;
            }
        }
        
        function getScoreGradient(score) {
            if (score >= 4.5) return '#4F9262, #22c55e';
            if (score >= 4.0) return '#22c55e, #84cc16';
            if (score >= 3.5) return '#eab308, #fbbf24';
            if (score >= 3.0) return '#f59e0b, #fb923c';
            return '#ef4444, #f87171';
        }

        // Lesson Observation Form - Opens in new window
        function openLessonObservationForm() {
            // Generate a unique case ID based on timestamp
            const caseId = `case_${Date.now()}`;
            const surveyUrl = `https://expeducate.surveycto.com/collect/eba_2025_monitoring_tool_v2?caseid=${caseId}`;
            
            // Open in new window with specific dimensions
            const width = 1200;
            const height = 800;
            const left = (screen.width - width) / 2;
            const top = (screen.height - height) / 2;
            
            window.open(
                surveyUrl,
                'LessonObservationForm',
                `width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes,toolbar=no,menubar=no,location=no,status=yes`
            );
        }

        // Initialize
        init();
        renderTrainerList();
    </script>
</body>
</html>
