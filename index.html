<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Performance Dashboard - Educate!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0e313e; color: #e2e8f0; min-height: 100vh; }
        
        /* Header */
        .header { background: #1a2730; padding: 16px 24px; border-bottom: 1px solid #4D889D; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .header h1 { color: #F1A01B; font-size: 24px; }
        .header-subtitle { color: #94a3b8; font-size: 14px; }
        .header-stats { display: flex; gap: 16px; }
        .stat-card { background: #0e313e; padding: 12px 16px; border-radius: 8px; border-left: 4px solid; min-width: 100px; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 12px; color: #94a3b8; }
        
        /* Main Layout */
        .main-container { display: flex; height: calc(100vh - 140px); }
        
        /* Sidebar */
        .sidebar { width: 300px; background: #1a2730; border-right: 1px solid #4D889D; display: flex; flex-direction: column; overflow: hidden; }
        .filter-section { padding: 16px; border-bottom: 1px solid #4D889D; }
        .filter-title { font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-bottom: 12px; }
        .filter-select { width: 100%; padding: 10px 12px; margin-bottom: 8px; background: #0e313e; border: 1px solid #4D889D; border-radius: 6px; color: #e2e8f0; font-size: 14px; cursor: pointer; }
        .filter-select:hover { border-color: #F1A01B; }
        .clear-btn { width: 100%; padding: 8px; background: transparent; border: 1px solid #475569; border-radius: 6px; color: #94a3b8; cursor: pointer; margin-top: 4px; }
        .clear-btn:hover { background: #4D889D; }
        
        /* Breadcrumb */
        .breadcrumb { font-size: 14px; color: #94a3b8; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .breadcrumb span { cursor: pointer; padding: 6px 12px; border-radius: 6px; transition: all 0.2s; }
        .breadcrumb span:hover { color: #F1A01B; background: rgba(249, 115, 22, 0.1); }
        .breadcrumb .active { color: #F1A01B; font-weight: 600; background: rgba(249, 115, 22, 0.15); }
        
        /* Trainer List */
        .trainer-list { flex: 1; overflow-y: auto; padding: 16px; }
        .list-title { font-size: 14px; color: #94a3b8; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .trainer-card { background: #0e313e; padding: 12px; margin-bottom: 8px; border-radius: 8px; border-left: 4px solid #6b7280; cursor: pointer; transition: all 0.2s; }
        .trainer-card:hover, .trainer-card.selected { background: #4D889D; transform: translateX(4px); }
        .trainer-card-name { font-weight: 600; margin-bottom: 4px; font-size: 14px; }
        .trainer-card-meta { font-size: 11px; color: #94a3b8; }
        .trainer-card-score { margin-top: 6px; font-size: 16px; font-weight: bold; }
        
        /* Main Panel */
        .main-panel { flex: 1; padding: 24px; overflow-y: auto; }
        .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: #64748b; }
        
        /* View Header */
        .view-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #1a2730; border-radius: 12px; margin-bottom: 24px; }
        .view-title { font-size: 24px; font-weight: bold; margin-bottom: 4px; }
        .view-subtitle { color: #94a3b8; font-size: 14px; }
        .score-circle { width: 100px; height: 100px; border-radius: 50%; background: #0e313e; border: 4px solid #F1A01B; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .score-circle-value { font-size: 28px; font-weight: bold; }
        .score-circle-label { font-size: 11px; color: #94a3b8; }
        
        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .tab { padding: 10px 20px; background: #1a2730; border: none; border-radius: 8px; color: #94a3b8; cursor: pointer; font-size: 14px; }
        .tab.active { background: #F1A01B; color: white; }
        .tab:hover:not(.active) { background: #4D889D; }
        
        /* Tab Content */
        .tab-content { background: #1a2730; border-radius: 12px; padding: 20px; }
        .section { margin-bottom: 24px; }
        .section:last-child { margin-bottom: 0; }
        .section-title { font-size: 16px; color: #F1A01B; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .stats-grid-item { background: #0e313e; padding: 16px; border-radius: 8px; text-align: center; }
        .stats-grid-value { font-size: 28px; font-weight: bold; color: #F1A01B; }
        .stats-grid-label { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        
        /* Comparison Grid */
        .comparison-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .comparison-card { background: #0e313e; padding: 16px; border-radius: 8px; border-left: 4px solid #F1A01B; }
        .comparison-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .comparison-icon { font-size: 20px; }
        .comparison-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; }
        .comparison-scores { display: flex; align-items: center; gap: 12px; margin: 12px 0; }
        .comparison-main-score { font-size: 32px; font-weight: bold; }
        .comparison-vs { color: #64748b; font-size: 14px; }
        .comparison-compare-score { font-size: 24px; color: #94a3b8; }
        .comparison-meta { display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8; margin-top: 8px; }
        
        /* Insight Cards */
        .insight-card { background: #0e313e; padding: 16px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid; }
        .insight-card.strength { border-left-color: #4F9262; background: #064e3b15; }
        .insight-card.concern { border-left-color: #ef4444; background: #7f1d1d15; }
        .insight-card.warning { border-left-color: #f59e0b; background: #78350f15; }
        .insight-title { font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .insight-title.strength { color: #4F9262; }
        .insight-title.concern { color: #ef4444; }
        .insight-title.warning { color: #f59e0b; }
        .insight-text { font-size: 13px; line-height: 1.6; color: #cbd5e1; }
        
        /* Action Steps */
        .action-step { background: #0e313e; padding: 16px; border-radius: 8px; margin-bottom: 12px; display: flex; gap: 16px; }
        .step-number { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; color: white; flex-shrink: 0; }
        .step-content { flex: 1; }
        .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
        .step-priority { font-weight: 600; font-size: 12px; }
        .step-timeline { font-size: 12px; color: #94a3b8; }
        .step-focus { font-weight: 600; margin-bottom: 8px; color: #F1A01B; }
        .step-actions { background: #1a2730; padding: 12px; border-radius: 6px; margin-top: 8px; }
        .step-actions-title { font-size: 11px; color: #F1A01B; font-weight: 600; margin-bottom: 8px; }
        .step-actions-list { margin-left: 20px; font-size: 13px; line-height: 1.8; }
        .success-metric { font-size: 12px; color: #4F9262; margin-top: 8px; padding: 8px; background: #064e3b15; border-radius: 4px; }
        
        /* Competency Bars */
        .competency-item { display: grid; grid-template-columns: 180px 1fr 60px; align-items: center; gap: 12px; margin-bottom: 12px; }
        .competency-label { font-size: 13px; }
        .competency-bar { height: 8px; background: #0e313e; border-radius: 4px; overflow: hidden; }
        .competency-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
        .competency-score { text-align: right; font-weight: bold; }
        
        /* Colors - Updated to match E!BA rubric */
        .score-critical { color: #A03434; }
        .score-needs-improvement { color: #ef4444; }
        .score-basic { color: #f59e0b; }
        .score-competent { color: #eab308; }
        .score-model { color: #4F9262; }
        
        .fill-critical { background: linear-gradient(90deg, #A03434, #dc2626); }
        .fill-needs-improvement { background: linear-gradient(90deg, #ef4444, #f87171); }
        .fill-basic { background: linear-gradient(90deg, #f59e0b, #fb923c); }
        .fill-competent { background: linear-gradient(90deg, #eab308, #fbbf24); }
        .fill-model { background: linear-gradient(90deg, #4F9262, #22c55e); }
        
        .border-critical { border-left-color: #A03434; }
        .border-needs-improvement { border-left-color: #ef4444; }
        .border-basic { border-left-color: #f59e0b; }
        .border-competent { border-left-color: #eab308; }
        .border-model { border-left-color: #4F9262; }
        
        /* Loading */
        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px; color: #94a3b8; }
        .spinner { width: 40px; height: 40px; border: 4px solid #4D889D; border-top-color: #F1A01B; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .comparison-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 968px) {
            .header { flex-direction: column; align-items: flex-start; }
            .header-stats { width: 100%; justify-content: space-between; }
            .stat-card { flex: 1; min-width: 80px; }
            
            .main-container { flex-direction: column; height: auto; min-height: calc(100vh - 200px); }
            .sidebar { 
                width: 100%; 
                border-right: none; 
                border-bottom: 2px solid #0F6A8C; 
                max-height: 400px;
                overflow-y: auto;
            }
            .main-panel { padding: 16px; }
            
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .comparison-grid { grid-template-columns: 1fr; }
        }
        
        @media (max-width: 768px) {
            body { font-size: 14px; }
            
            .header h1 { font-size: 20px; }
            .header-subtitle { font-size: 12px; }
            .stat-card { padding: 10px 12px; min-width: 70px; }
            .stat-value { font-size: 20px; }
            .stat-label { font-size: 11px; }
            
            /* Filters on mobile - stack vertically */
            .filter-bar { flex-direction: column; align-items: stretch !important; }
            .filter-bar > div:first-child { width: 100%; margin-bottom: 12px; }
            .filter-bar > div:last-child { 
                flex-direction: column; 
                align-items: stretch !important;
                gap: 8px !important;
            }
            .filter-bar select { width: 100% !important; min-width: auto !important; }
            .filter-bar button { width: 100%; }
            
            .breadcrumb { flex-wrap: wrap; font-size: 12px; }
            .breadcrumb span { padding: 4px 8px; font-size: 12px; }
            
            .sidebar { max-height: 300px; }
            .trainer-card { padding: 10px; }
            .trainer-card-name { font-size: 13px; }
            .trainer-card-meta { font-size: 10px; }
            .trainer-card-score { font-size: 14px; }
            
            .view-header { flex-direction: column; text-align: center; }
            .view-title { font-size: 20px; }
            .view-subtitle { font-size: 12px; }
            .score-circle { width: 80px; height: 80px; margin-top: 12px; }
            .score-circle-value { font-size: 24px; }
            
            .tabs { overflow-x: auto; flex-wrap: nowrap; }
            .tab { padding: 8px 16px; font-size: 13px; white-space: nowrap; }
            
            .section-title { font-size: 14px; }
            .stats-grid { grid-template-columns: 1fr; }
            .stats-grid-value { font-size: 24px; }
            
            .tab-content { padding: 16px; }
        }
        
        @media (max-width: 480px) {
            .header { padding: 12px 16px; }
            .header h1 { font-size: 18px; }
            .header-stats { gap: 8px; }
            .stat-card { padding: 8px 10px; }
            .stat-value { font-size: 18px; }
            
            .main-panel { padding: 12px; }
            .sidebar { max-height: 250px; }
            
            .view-title { font-size: 18px; }
            .score-circle { width: 70px; height: 70px; }
            .score-circle-value { font-size: 20px; }
            
            .tab { padding: 6px 12px; font-size: 12px; }
            .tab-content { padding: 12px; }
        }
    </style>
</head>
<body>
    
    <div class="header">
        <div>
            <h1>Trainer Performance Dashboard</h1>
            <div class="header-subtitle">E!BA Bootcamp • Educate! Uganda</div>
        </div>
        <div style="display: flex; gap: 16px; align-items: center; flex-wrap: wrap;">
            <!-- Date Range Filter -->
            <div style="display: flex; gap: 8px; align-items: center; background: #1a2730; padding: 8px 16px; border-radius: 8px; border: 1px solid #4D889D;">
                <span style="color: #94a3b8; font-size: 13px; font-weight: 600;">📅 Date Range:</span>
                <input type="date" id="date-from" onchange="applyDateFilter()"
                       style="background: #0e313e; border: 1px solid #4D889D; color: #e2e8f0; padding: 6px 10px; border-radius: 6px; font-size: 13px; cursor: pointer;"
                       placeholder="Start date">
                <span style="color: #64748b;">to</span>
                <input type="date" id="date-to" onchange="applyDateFilter()"
                       style="background: #0e313e; border: 1px solid #4D889D; color: #e2e8f0; padding: 6px 10px; border-radius: 6px; font-size: 13px; cursor: pointer;"
                       placeholder="End date">
            </div>
            
            <button onclick="openLessonObservationForm()" style="padding: 12px 24px; background: #4F9262; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px; transition: all 0.2s;">
                <span style="font-size: 18px;">📝</span>
                <span>Lesson Observation Form</span>
            </button>
            <div class="header-stats" id="header-stats"></div>
        </div>
    </div>
    
    <!-- Horizontal Filters Pane -->
    <div style="background: #1a2730; border-bottom: 1px solid #4D889D; padding: 16px 32px;">
        <div class="filter-bar" style="display: flex; gap: 16px; align-items: center; flex-wrap: wrap; max-width: 1400px; margin: 0 auto;">
            <!-- Breadcrumb Navigation -->
            <div style="flex: 1; min-width: 200px;">
                <div class="breadcrumb" id="breadcrumb">
                    <span onclick="selectLevel('program')" class="active">🌍 Program</span>
                </div>
            </div>
            
            <!-- Filters -->
            <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                <div style="display: flex; gap: 8px; align-items: center;">
                    <span style="color: #94a3b8; font-size: 13px; font-weight: 600;">📍</span>
                    <select class="filter-select" id="district-filter" onchange="selectDistrict()" style="min-width: 150px;">
                        <option value="">All Districts</option>
                    </select>
                </div>
                
                <div style="display: flex; gap: 8px; align-items: center;">
                    <span style="color: #94a3b8; font-size: 13px; font-weight: 600;">🏫</span>
                    <select class="filter-select" id="site-filter" onchange="selectSite()" style="min-width: 180px;">
                        <option value="">All Sites</option>
                    </select>
                </div>
                
                <button class="clear-btn" onclick="clearFilters()" style="padding: 8px 16px; background: #4D889D; color: #e2e8f0; border: 1px solid #475569; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s;"
                        onmouseover="this.style.background='#475569'" 
                        onmouseout="this.style.background='#4D889D'">
                    Clear Filters
                </button>
            </div>
        </div>
    </div>
    
    <div class="main-container">
        <div class="sidebar">
            <div class="trainer-list" id="trainer-list"></div>
        </div>
        
        <div class="main-panel" id="main-panel">
            <div class="loading">
                <div class="spinner"></div>
                <p class="loading-text">Loading...</p>
            </div>
        </div>
    </div>
    
    <script>
        // ==================== APPS SCRIPT CONFIGURATION ====================
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxKhsB3zKXr8IPcbA4u_3GEWONsZ5AwmvEicybrdNicl_K7jsvEIHLzhKwhEv9JkpLd/exec';
        
        // Global data object - will be populated from Google Sheets via Apps Script
        let DEMO_DATA = {
            program: {
                name: 'E!BA Bootcamp',
                trainers: 0,
                observations: 0,
                average: 0,
                date_range: '',
                districts: 0,
                sites: 0
            },
            districts: [],
            sites: [],
            trainers: []
        };
        
        // ==================== LOAD DATA FROM GOOGLE SHEETS ====================
        async function loadGoogleSheetData() {
            try {
                console.log('📊 Loading data from Google Apps Script...');
                console.log('URL:', APPS_SCRIPT_URL);
                
                // Add timeout to prevent infinite loading
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000); // 30 second timeout
                
                const response = await fetch(APPS_SCRIPT_URL, { 
                    signal: controller.signal,
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                clearTimeout(timeoutId);
                
                console.log('Response status:', response.status);
                console.log('Response ok:', response.ok);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Data received:', data);
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                // Validate data structure
                if (!data.trainers || !Array.isArray(data.trainers)) {
                    throw new Error('Invalid data structure: trainers array missing');
                }
                
                if (data.trainers.length === 0) {
                    throw new Error('No trainers found in data');
                }
                
                console.log('✅ Data loaded successfully!');
                console.log('   Trainers:', data.trainers.length);
                console.log('   Observations:', data.program?.observations || 0);
                console.log('   Date range:', data.program?.date_range || 'N/A');
                
                // Update global DEMO_DATA
                DEMO_DATA = data;
                
                return true;
            } catch (error) {
                console.error('❌ Error loading data from Apps Script:', error);
                
                if (error.name === 'AbortError') {
                    alert(`⏱️ Request Timeout!\n\nThe request took too long (>30 seconds).\n\nPossible causes:\n1. Apps Script is processing a large dataset\n2. Network connection is slow\n3. Apps Script needs optimization\n\nTry refreshing the page.`);
                } else {
                    alert(`❌ Cannot load data from Google Sheets!\n\nError: ${error.message}\n\nPlease check:\n1. Apps Script URL is correct\n2. Apps Script is deployed as Web App with "Anyone" access\n3. You have internet connection\n4. Open browser console (F12) for more details`);
                }
                return false;
            }
        }

        let state = {
            level: 'program', // program, district, site, trainer
            selectedDistrict: null,
            selectedSite: null,
            selectedTrainer: null,
            dateFrom: null,  // No default filter
            dateTo: null,    // No default filter
            activeTab: 'overview'
        };

        // Initialize
        // ==================== INITIALIZATION ====================
        async function init() {
            // Show loading screen
            showLoadingScreen();
            
            // Load data from Google Sheets via Apps Script
            const success = await loadGoogleSheetData();
            
            if (!success) {
                showErrorScreen();
                return;
            }
            
            // Hide loading, show dashboard
            hideLoadingScreen();
            
            // Initialize dashboard
            populateFilters();
            updateHeaderStats();
            renderBreadcrumb();
            renderView();
            
            // Set default date values
            const dateFrom = document.getElementById('date-from');
            const dateTo = document.getElementById('date-to');
            
            if (dateFrom && dateTo) {
                // Use dates from loaded data if available
                const dates = DEMO_DATA.program.date_range?.split(' to ') || [];
                if (dates.length === 2) {
                    state.dateFrom = dates[0];
                    state.dateTo = dates[1];
                    dateFrom.value = dates[0];
                    dateTo.value = dates[1];
                }
            }
        }
        
        function showLoadingScreen() {
            const root = document.getElementById('root');
            if (root) {
                root.innerHTML = `
                    <div style="display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #0e313e 0%, #1a2730 100%);">
                        <div style="text-align: center;">
                            <div style="width: 64px; height: 64px; border: 4px solid #4D889D; border-top-color: #F1A01B; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div>
                            <p style="color: #94a3b8; font-size: 16px; font-weight: 600;">Loading E!BA Dashboard...</p>
                            <p style="color: #64748b; font-size: 13px; margin-top: 8px;">Fetching data from Google Sheets</p>
                        </div>
                    </div>
                    <style>
                        @keyframes spin { to { transform: rotate(360deg); } }
                    </style>
                `;
            }
        }
        
        function hideLoadingScreen() {
            const root = document.getElementById('root');
            if (root) {
                root.innerHTML = ''; // Will be populated by renderView()
            }
        }
        
        function showErrorScreen() {
            const root = document.getElementById('root');
            if (root) {
                root.innerHTML = `
                    <div style="display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #0e313e 0%, #1a2730 100%); padding: 2rem;">
                        <div style="text-align: center; max-width: 600px;">
                            <div style="font-size: 64px; margin-bottom: 16px;">❌</div>
                            <h2 style="color: #ef4444; margin-bottom: 16px; font-size: 24px;">Failed to Load Data</h2>
                            <p style="color: #94a3b8; line-height: 1.6; margin-bottom: 8px;">
                                Could not load data from Google Sheets via Apps Script.
                            </p>
                            <p style="color: #64748b; font-size: 14px; line-height: 1.6; margin-bottom: 24px;">
                                Please check:<br>
                                • Apps Script URL is correct<br>
                                • Apps Script is deployed as Web App<br>
                                • You have internet connection<br><br>
                                Check browser console (F12) for detailed error message.
                            </p>
                            <button onclick="location.reload()" style="padding: 12px 24px; background: #F1A01B; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px;">
                                🔄 Retry
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        // Populate Filters
        function populateFilters() {

                const trainer = DEMO_DATA.trainers.find(t => t.trainer_id === state.selectedTrainer);
                return {

        // Render Trainer List
        function renderTrainerList() {
            const container = document.getElementById('trainer-list');
            
            if (state.level === 'trainer') {
                container.style.display = 'none';
                return;
            }
            
            container.style.display = 'block';
            
            let trainers = DEMO_DATA.trainers;
            
            // Filter by district
            if (state.selectedDistrict) {
                trainers = trainers.filter(t => t.district_name === state.selectedDistrict);
            }
            
            // Filter by site
            if (state.selectedSite) {
                trainers = trainers.filter(t => t.training_site === state.selectedSite);
            }
            
            // Filter by date range - only show trainers with observations in the date range
            if (state.dateFrom || state.dateTo) {
                const fromDate = state.dateFrom ? new Date(state.dateFrom) : new Date('2000-01-01');
                const toDate = state.dateTo ? new Date(state.dateTo) : new Date('2099-12-31');
                
                trainers = trainers.filter(t => 
                    t.observations.some(obs => {
                        const obsDate = new Date(obs.date);
                        return obsDate >= fromDate && obsDate <= toDate;
                    })
                );
            }
            
            // Sort by score
            trainers = trainers.sort((a, b) => b.stats.average_score - a.stats.average_score);
            
            if (trainers.length === 0) {
                container.innerHTML = '<div class="list-title">No trainers found</div>';
                return;
            }
            
            container.innerHTML = `
                <div style="padding: 16px; background: #1a2730; border-bottom: 1px solid #4D889D; margin: -16px -16px 16px -16px;">

            if (score <= 1.49) return 'critical';

            if (score <= 3.49) return 'basic';
            if (score <= 4.49) return 'competent';
            return 'model';

            if (score <= 1.49) return 'Requires Critical Development';
            if (score <= 2.49) return 'Needs Significant Improvement';
            if (score <= 3.49) return 'Meets Basic Expectations';
            if (score <= 4.49) return 'Meets Expectations Consistently';
            return 'Model Performance';

            if (score <= 1.49) return 'The trainer requires critical development';

        function renderProgramInsights() {
            const trainers = DEMO_DATA.trainers;
            const programAvg = DEMO_DATA.program.average;
            
            // Identify needs attention
            const needsAttention = trainers.filter(t => t.stats.average_score < 3.5 || t.stats.trend === 'declining');
            const highPerformers = trainers.filter(t => t.stats.average_score >= 4.5);
            
            // Calculate competency averages
            const competencies = {
                'Pedagogical Content': 0,
                'Facilitation & Delivery': 0,
                'Entrepreneurship Mindset': 0,
                'Gender Responsive': 0,
                'Coaching & Mentoring': 0,
                'Language': 0,
                'Leadership': 0
            };
            
            trainers.forEach(t => {
                Object.keys(competencies).forEach(comp => {
                    competencies[comp] += t.stats.competencies[comp];
                });
            });
            
            Object.keys(competencies).forEach(comp => {
                competencies[comp] = competencies[comp] / trainers.length;
            });
            
            // Find strongest and weakest competencies
            const sortedComps = Object.entries(competencies).sort((a, b) => b[1] - a[1]);
            const strongest = sortedComps.slice(0, 3);
            const weakest = sortedComps.slice(-3);
            
            const urgency = needsAttention.length >= 5 ? 'immediate' : needsAttention.length >= 3 ? 'short-term' : 'monitoring';
            const urgencyColor = urgency === 'immediate' ? '#ef4444' : urgency === 'short-term' ? '#f59e0b' : '#4F9262';
            
            return `
                <div class="section">
                    <h3 class="section-title">📋 Executive Summary</h3>
                    <div style="background: #0e313e; padding: 20px; border-radius: 8px; line-height: 1.8;">
                        <p style="color: #cbd5e1;">
                            The <strong>E!BA Bootcamp program</strong> comprises <strong>${trainers.length} trainers</strong> across 
                            <strong>${DEMO_DATA.program.districts} districts</strong>, with <strong>${DEMO_DATA.program.observations} total observations</strong> 
                            conducted from November 25 to December 15, 2025.
                        </p>
                        <p style="color: #cbd5e1; margin-top: 12px;">
                            The program average is <strong class="score-${getScoreColor(programAvg)}">${programAvg.toFixed(2)}/5.0 (${getScoreLabel(programAvg)})</strong>.
                            <strong>${highPerformers.length} trainers (${((highPerformers.length/trainers.length)*100).toFixed(0)}%)</strong> are performing at Exceptional levels,
                            while <strong>${needsAttention.length} trainers (${((needsAttention.length/trainers.length)*100).toFixed(0)}%)</strong> need additional support.
                        </p>
                    </div>
                </div>
                
                <div class="section">
                    <h3 class="section-title">⚡ Intervention Urgency</h3>
                    <div style="display: flex; align-items: center; gap: 16px;">
                        <span style="padding: 8px 16px; background: ${urgencyColor}; color: white; border-radius: 20px; font-weight: bold; font-size: 14px;">
                            ${urgency.toUpperCase()}
                        </span>
                        <span style="color: #94a3b8;">
                            ${urgency === 'immediate' ? 'Multiple trainers need urgent intervention' :
                              urgency === 'short-term' ? 'Some trainers need focused support within 2-3 weeks' :
                              'Program performing well - continue regular monitoring'}
                        </span>
                    </div>
                </div>
                
                <div class="section">
                    <h3 class="section-title">💪 Program Strengths</h3>
                    ${strongest.map(([comp, score]) => `
                        <div class="insight-card strength">
                            <div class="insight-title strength">${comp} (${score.toFixed(2)}/5.0)</div>
                            <div class="insight-text">
                                Program average for this competency is ${score >= programAvg ? 'above' : 'at'} the overall program average.
                                ${score >= 4.0 ? 'This is a strong area across the cohort.' : 'Continued focus needed to strengthen this area.'}
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="section">
                    <h3 class="section-title">🎯 Areas for Program-Wide Development</h3>
                    ${weakest.map(([comp, score]) => `
                        <div class="insight-card ${score < 3.5 ? 'concern' : 'warning'}">
                            <div class="insight-title ${score < 3.5 ? 'concern' : 'warning'}">${comp} (${score.toFixed(2)}/5.0)</div>
                            <div class="insight-text">
                                This competency is ${score < programAvg ? 'below' : 'at'} the program average.
                                Consider program-wide professional development sessions focused on strengthening this area.
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                ${needsAttention.length > 0 ? `
                    <div class="section">
                        <h3 class="section-title">🚨 Trainers Needing Immediate Attention</h3>
                        ${needsAttention.map(t => `
                            <div style="display: grid; grid-template-columns: 1fr 80px 120px 150px; gap: 12px; align-items: center; padding: 12px; background: #7f1d1d20; border-radius: 8px; border-left: 4px solid #ef4444; margin-bottom: 8px; cursor: pointer;" onclick="selectTrainer('${t.trainer_id}')">
                                <div>
                                    <div style="font-weight: 600;">${t.trainer_name}</div>
                                    <div style="font-size: 11px; color: #94a3b8;">${t.training_site}</div>
                                </div>
                                <div class="score-${getScoreColor(t.stats.average_score)}" style="font-weight: bold; font-size: 18px;">
                                    ${t.stats.average_score.toFixed(2)}
                                </div>

                                    ${t.stats.trend === 'declining' ? '📉 Declining' : '⚠️ Below threshold'}
                                </div>
                                <div style="font-size: 11px; color: #94a3b8;">
                                    Click for analysis
                                </div>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
                
                <div class="section">
                    <h3 class="section-title">📝 Action Plan</h3>
                    <p style="color: #94a3b8; font-size: 14px; margin-bottom: 20px;">Recommended interventions for program managers:</p>
                    ${[

                            priority: needsAttention.length >= 5 ? 'IMMEDIATE' : 'SHORT-TERM',
                            timeline: needsAttention.length >= 5 ? 'This week' : 'Within 2 weeks',
                            title: 'Support Struggling Trainers',
                            actions: [
                                `Identify root causes for underperformance in ${needsAttention.length} trainers`,
                                'Schedule individual check-ins with each trainer',
                                'Develop personalized improvement plans',
                                'Assign mentors from high-performing trainers'
                            ],
                            metric: `Improve scores for ${needsAttention.length} trainers above 5.5`
                        },
                        {
                            step: 2,
                            priority: 'SHORT-TERM',
                            timeline: 'Within 2 weeks',
                            title: `Group Training: ${weakest[0][0]}`,
                            actions: [
                                `Organize 2-hour workshop on ${weakest[0][0]} (current avg: ${weakest[0][1].toFixed(2)})`,
                                'Share best practices from top performers',
                                'Provide practical exercises and resources',
                                'Follow up with targeted coaching'
                            ],
                            metric: `Increase group average from ${weakest[0][1].toFixed(2)} to ${(weakest[0][1] + 0.5).toFixed(2)}`
                        },
                        {
                            step: 3,
                            priority: 'ONGOING',
                            timeline: 'Continuous',
                            title: 'Peer Learning & Recognition',
                            actions: [
                                `Pair top performers (${highPerformers.map(t => t.trainer_name).slice(0, 2).join(', ')}) with struggling trainers`,
                                'Recognize and celebrate improvements publicly',
                                'Create opportunities for best practice sharing',
                                'Document successful approaches for program-wide use'
                            ],
                            metric: `Increase number of trainers in "Strong" or "Exceptional" categories`
                        }
                    ].map(plan => {
                        const priorityColor = plan.priority === 'IMMEDIATE' ? '#ef4444' : 
                                            plan.priority === 'SHORT-TERM' ? '#f59e0b' : '#4F9262';
                        const priorityBg = plan.priority === 'IMMEDIATE' ? '#7f1d1d33' : 
                                         plan.priority === 'SHORT-TERM' ? '#78350f33' : '#064e3b33';
                        return `
                            <div style="background: ${priorityBg}; border: 1px solid ${priorityColor}40; border-radius: 12px; padding: 20px; margin-bottom: 16px; position: relative; overflow: hidden;">
                                <div style="position: absolute; top: 16px; right: 16px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: #94a3b8;">
                                    <span>⏱️</span>
                                    <span>${plan.timeline}</span>
                                </div>
                                <div style="display: flex; align-items: start; gap: 16px;">
                                    <div style="width: 44px; height: 44px; border-radius: 50%; background: ${priorityColor}; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; flex-shrink: 0;">
                                        ${plan.step}

                                    <div style="flex: 1;">
                                        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                                            <span style="padding: 4px 12px; background: ${priorityColor}; color: white; border-radius: 12px; font-size: 11px; font-weight: bold;">

                                            </span>
                                            <h4 style="color: #e2e8f0; font-size: 16px; margin: 0;">${plan.title}</h4>

                                            <div style="font-size: 11px; color: #F1A01B; font-weight: 600; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;">Action Steps:</div>
                                            <ul style="margin: 0; padding-left: 20px; color: #cbd5e1; font-size: 14px; line-height: 1.8;">
                                                ${plan.actions.map(a => `<li>${a}</li>`).join('')}
                                            </ul>
                                        </div>
                                        <div style="display: flex; align-items: center; gap: 8px; color: #4F9262; font-size: 13px;">
                                            <span>💚</span>
                                            <span style="font-weight: 500;">Success Metric:</span>
                                            <span>${plan.metric}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderDistrictComparisons(district, districtTrainers, programAvg) {

            const maleAvg = maleTrainers.length > 0 ? maleTrainers.reduce((sum, t) => sum + t.stats.average_score, 0) / maleTrainers.length : 0;
            const femaleAvg = femaleTrainers.length > 0 ? femaleTrainers.reduce((sum, t) => sum + t.stats.average_score, 0) / femaleTrainers.length : 0;
            
            // Weekly trends
            const weeklyData = {};
            districtTrainers.forEach(trainer => {
                if (trainer.observations && Array.isArray(trainer.observations)) {
                    trainer.observations.forEach(obs => {
                        // Try different week field names
                        const weekKey = obs.Week || obs.week || obs.week_number || obs.training_week || obs.observation_week;
                        if (weekKey && obs.overall_score) {
                            if (!weeklyData[weekKey]) {
                                weeklyData[weekKey] = { total: 0, count: 0 };
                            }
                            weeklyData[weekKey].total += parseFloat(obs.overall_score);
                            weeklyData[weekKey].count++;
                        }
                    });
                }
            });
            const weeks = Object.keys(weeklyData).sort();
            const weeklyAverages = weeks.map(week => ({
                week,
                avg: weeklyData[week].total / weeklyData[week].count
            }));
            
            // Debug logging
            console.log('District Comparisons - Weekly Data:', {
                districtName: district.name,
                weeklyData,
                weeks,
                weeklyAverages,
                sampleObservations: districtTrainers[0]?.observations?.slice(0, 2)

            // Trend analysis
            const improving = districtTrainers.filter(t => t.stats.trend === 'improving').length;

                            <strong style="color: ${district.average >= programAvg ? '#4F9262' : '#ef4444'};">

        function renderSiteView() {
            const siteName = state.selectedSite;
            const site = DEMO_DATA.sites.find(s => s.name === siteName);
            if (!site) {
                // Fallback - calculate from trainers
                const siteTrainers = DEMO_DATA.trainers.filter(t => t.training_site === siteName);
                if (siteTrainers.length === 0) return '<p>Site not found</p>';
                
                const siteAvg = siteTrainers.reduce((sum, t) => sum + t.stats.average_score, 0) / siteTrainers.length;
                const siteObs = siteTrainers.reduce((sum, t) => sum + t.stats.observation_count, 0);
                
                const tempSite = {
                    name: siteName,
                    district: siteTrainers[0].district_name,
                    trainers: siteTrainers.length,
                    observations: siteObs,
                    average: siteAvg
                };
                
                return renderSiteContent(tempSite, siteTrainers);
            }
            
            const siteTrainers = DEMO_DATA.trainers.filter(t => t.training_site === siteName);
            return renderSiteContent(site, siteTrainers);
        }

        function renderSiteComparisons(site, siteTrainers) {
            const district = DEMO_DATA.districts.find(d => d.name === site.district);
            const programAvg = DEMO_DATA.program.average;
            const districtAvg = district ? district.average : programAvg;
            
            // Gender comparison
            const maleTrainers = siteTrainers.filter(t => t.trainer_gender === 'Male');
            const femaleTrainers = siteTrainers.filter(t => t.trainer_gender === 'Female');
            const maleAvg = maleTrainers.length > 0 ? maleTrainers.reduce((sum, t) => sum + t.stats.average_score, 0) / maleTrainers.length : 0;
            const femaleAvg = femaleTrainers.length > 0 ? femaleTrainers.reduce((sum, t) => sum + t.stats.average_score, 0) / femaleTrainers.length : 0;
            
            // Weekly trends
            const weeklyData = {};
            siteTrainers.forEach(trainer => {
                if (trainer.observations && Array.isArray(trainer.observations)) {
                    trainer.observations.forEach(obs => {
                        // Try different week field names
                        const weekKey = obs.Week || obs.week || obs.week_number || obs.training_week || obs.observation_week;
                        if (weekKey && obs.overall_score) {
                            if (!weeklyData[weekKey]) {
                                weeklyData[weekKey] = { total: 0, count: 0 };
                            }
                            weeklyData[weekKey].total += parseFloat(obs.overall_score);
                            weeklyData[weekKey].count++;
                        }
                    });
                }
            });
            const weeks = Object.keys(weeklyData).sort();
            const weeklyAverages = weeks.map(week => ({
                week,
                avg: weeklyData[week].total / weeklyData[week].count
            }));
            
            // Trend analysis
            const improving = siteTrainers.filter(t => t.stats.trend === 'improving').length;
            const stable = siteTrainers.filter(t => t.stats.trend === 'stable').length;
            const declining = siteTrainers.filter(t => t.stats.trend === 'declining').length;
            
            return `
                <div class="section">
                    <h3 class="section-title">📊 Site Performance Comparisons</h3>
                    <div class="comparison-grid">
                        <div class="comparison-card">

                                <div class="comparison-icon">🏫</div>
                                <div class="comparison-label">Site vs District</div>
                            </div>
                            <div class="comparison-scores">
                                <div class="comparison-main-score score-${getScoreColor(site.average)}">${site.average.toFixed(2)}</div>
                                <div class="comparison-vs">vs</div>

                            </div>
                            <div class="comparison-meta">
                                <span style="color: ${site.average >= districtAvg ? '#4F9262' : '#ef4444'};">
                                    ${site.average >= districtAvg ? '+' : ''}${(site.average - districtAvg).toFixed(2)} vs district
                                </span>
                            </div>
                        </div>
                        
                        <div class="comparison-card">
                            <div class="comparison-header">
                                <div class="comparison-icon">🌍</div>
                                <div class="comparison-label">Site vs Program</div>
                            </div>
                            <div class="comparison-scores">
                                <div class="comparison-main-score score-${getScoreColor(site.average)}">${site.average.toFixed(2)}</div>
                                <div class="comparison-vs">vs</div>
                                <div class="comparison-compare-score">${programAvg.toFixed(2)}</div>
                            </div>
                            <div class="comparison-meta">
                                <span style="color: ${site.average >= programAvg ? '#4F9262' : '#ef4444'};">
                                    ${site.average >= programAvg ? '+' : ''}${(site.average - programAvg).toFixed(2)} vs program

                ${siteTrainers.length > 1 && (maleTrainers.length > 0 && femaleTrainers.length > 0) ? `
                <div class="section">

                                <span style="font-size: 32px;">👨</span>

                                </div>
                            </div>

                                <div style="font-size: 12px; color: #94a3b8; margin-bottom: 4px;">Average Score</div>
                                <div style="font-size: 28px; font-weight: bold;" class="score-${getScoreColor(maleAvg)}">
                                    ${maleAvg.toFixed(2)}
                                </div>
                                <div style="font-size: 11px; color: #64748b; margin-top: 4px;">
                                    ${getScoreLabel(maleAvg)}
                                </div>
                            </div>
                        </div>
                        
                        <div style="background: #0e313e; padding: 20px; border-radius: 8px; border-left: 4px solid #F1A01B;">
                            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                                <span style="font-size: 32px;">👩</span>
                                <div>
                                    <div style="font-size: 14px; color: #94a3b8;">Female Trainers</div>
                                    <div style="font-size: 24px; font-weight: bold; color: #F1A01B;">${femaleTrainers.length}</div>
                                </div>
                            </div>
                            <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #1a2730;">
                                <div style="font-size: 12px; color: #94a3b8; margin-bottom: 4px;">Average Score</div>
                                <div style="font-size: 28px; font-weight: bold;" class="score-${getScoreColor(femaleAvg)}">
                                    ${femaleAvg.toFixed(2)}
                                </div>
                                <div style="font-size: 11px; color: #64748b; margin-top: 4px;">

                            </div>

                            <strong>${maleAvg > femaleAvg ? 'Male' : 'Female'} trainers</strong> are performing

                            on average at ${site.name}.
                        </div>
                    </div>
                </div>
                ` : ''}
                
                ${weeklyAverages.length > 1 ? `
                <div class="section">
                    <h3 class="section-title">📈 Weekly Performance Trends</h3>
                    <div style="background: #0e313e; padding: 20px; border-radius: 8px;">

                            ${weeklyAverages.map((w, i) => {
                                const maxScore = 5;
                                const heightPercent = (w.avg / maxScore) * 100;
                                const isHighest = w.avg === Math.max(...weeklyAverages.map(wa => wa.avg));
                                return `
                                    <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px;">

                                            ${w.avg.toFixed(2)}
                                        </div>
                                        <div style="width: 100%; height: ${heightPercent}%; background: ${isHighest ? '#4F9262' : '#4D889D'}; border-radius: 4px 4px 0 0; min-height: 20px; display: flex; align-items: start; justify-content: center; padding-top: 8px;">
                                            ${isHighest ? '<span style="font-size: 16px;">🏆</span>' : ''}

                        </div>
                        <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #1a2730; font-size: 13px; color: #94a3b8;">
                            ${weeklyAverages[weeklyAverages.length - 1].avg > weeklyAverages[0].avg ? 
                                `📈 <span style="color: #4F9262;">Positive trend:</span> Performance improved from ${weeklyAverages[0].avg.toFixed(2)} (Week 1) to ${weeklyAverages[weeklyAverages.length - 1].avg.toFixed(2)} (Week ${weeklyAverages.length})` :
                                weeklyAverages[weeklyAverages.length - 1].avg < weeklyAverages[0].avg ?
                                `📉 <span style="color: #ef4444;">Declining trend:</span> Performance decreased from ${weeklyAverages[0].avg.toFixed(2)} (Week 1) to ${weeklyAverages[weeklyAverages.length - 1].avg.toFixed(2)} (Week ${weeklyAverages.length})` :
                                `➡️ <span style="color: #94a3b8;">Stable performance:</span> Maintaining ${weeklyAverages[0].avg.toFixed(2)} across ${weeklyAverages.length} weeks`
                            }
                        </div>
                    </div>
                </div>
                ` : ''}
                
                ${siteTrainers.length > 1 ? `
                <div class="section">
                    <h3 class="section-title">📊 Performance Trajectory</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px;">
                        <div style="background: #0e313e; padding: 16px; border-radius: 8px; border-left: 4px solid #4F9262;">
                            <div style="font-size: 28px; margin-bottom: 8px;">📈</div>
                            <div style="font-size: 24px; font-weight: bold; color: #4F9262;">${improving}</div>
                            <div style="font-size: 12px; color: #94a3b8; margin-top: 4px;">Improving</div>
                            <div style="font-size: 11px; color: #64748b; margin-top: 2px;">${((improving/siteTrainers.length)*100).toFixed(0)}% of trainers</div>
                        </div>
                        <div style="background: #0e313e; padding: 16px; border-radius: 8px; border-left: 4px solid #94a3b8;">
                            <div style="font-size: 28px; margin-bottom: 8px;">➡️</div>
                            <div style="font-size: 24px; font-weight: bold; color: #94a3b8;">${stable}</div>
                            <div style="font-size: 12px; color: #94a3b8; margin-top: 4px;">Stable</div>
                            <div style="font-size: 11px; color: #64748b; margin-top: 2px;">${((stable/siteTrainers.length)*100).toFixed(0)}% of trainers</div>
                        </div>
                        <div style="background: #0e313e; padding: 16px; border-radius: 8px; border-left: 4px solid #ef4444;">
                            <div style="font-size: 28px; margin-bottom: 8px;">📉</div>
                            <div style="font-size: 24px; font-weight: bold; color: #ef4444;">${declining}</div>
                            <div style="font-size: 12px; color: #94a3b8; margin-top: 4px;">Declining</div>
                            <div style="font-size: 11px; color: #64748b; margin-top: 2px;">${((declining/siteTrainers.length)*100).toFixed(0)}% of trainers</div>
                        </div>
                    </div>
                </div>
                ` : ''}
                
                <div class="section">
                    <h3 class="section-title">👥 Trainer Rankings at Site</h3>
                    ${siteTrainers.sort((a, b) => b.stats.average_score - a.stats.average_score).map((t, i) => `
                        <div style="display: grid; grid-template-columns: 50px 1fr 80px 120px; gap: 12px; align-items: center; padding: 12px; background: ${i === 0 ? '#064e3b20' : '#0e313e'}; border-radius: 8px; border-left: 4px solid ${i === 0 ? '#4F9262' : '#4D889D'}; margin-bottom: 8px; cursor: pointer;" onclick="selectTrainer('${t.trainer_id}')">
                            <div style="text-align: center;">
                                <div style="font-size: 20px; font-weight: bold; color: ${i === 0 ? '#fbbf24' : '#94a3b8'};">
                                    #${i + 1}
                                </div>
                            </div>
                            <div>
                                <div style="font-weight: 600;">${t.trainer_name}</div>
                                <div style="font-size: 11px; color: #94a3b8;">${t.stats.observation_count} observations</div>
                            </div>
                            <div class="score-${getScoreColor(t.stats.average_score)}" style="font-weight: bold; font-size: 20px;">
                                ${t.stats.average_score.toFixed(2)}
                            </div>
                            <div style="font-size: 11px; color: ${t.stats.average_score >= site.average ? '#4F9262' : '#ef4444'};">
                                ${t.stats.average_score >= site.average ? '↑' : '↓'} ${Math.abs(t.stats.average_score - site.average).toFixed(2)} vs site avg
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="section">
                    <h3 class="section-title">📈 Competency Comparison</h3>
                    <p style="font-size: 13px; color: #94a3b8; margin-bottom: 16px;">Average scores across all trainers at this site</p>
                    ${(() => {
                        const competencies = {
                            'Pedagogical Content': 0,
                            'Facilitation & Delivery': 0,
                            'Entrepreneurship Mindset': 0,
                            'Gender Responsive': 0,
                            'Coaching & Mentoring': 0,
                            'Language': 0,
                            'Leadership': 0
                        };
                        
                        siteTrainers.forEach(t => {
                            Object.keys(competencies).forEach(comp => {
                                competencies[comp] += t.stats.competencies[comp];
                            });
                        });
                        
                        Object.keys(competencies).forEach(comp => {
                            competencies[comp] = competencies[comp] / siteTrainers.length;
                        });
                        
                        return Object.entries(competencies).map(([comp, score]) => `
                            <div class="competency-item">
                                <div class="competency-label">${comp}</div>
                                <div class="competency-bar">
                                    <div class="competency-fill fill-${getScoreColor(score)}" style="width: ${(score/5)*100}%"></div>
                                </div>
                                <div class="competency-score score-${getScoreColor(score)}">${score.toFixed(2)}</div>
                            </div>
                        `).join('');
                    })()}
                </div>
            `;
        }

        function renderSiteInsights(site, siteTrainers) {
            const needsAttention = siteTrainers.filter(t => t.stats.average_score <= 3.49);
            const highPerformers = siteTrainers.filter(t => t.stats.average_score > 4.49);
            const district = DEMO_DATA.districts.find(d => d.name === site.district);
            const districtAvg = district ? district.average : DEMO_DATA.program.average;
            
            return `
                <div class="section">
                    <h3 class="section-title">📋 Site Summary</h3>
                    <div style="background: #0e313e; padding: 20px; border-radius: 8px; line-height: 1.8;">
                        <p style="color: #cbd5e1;">
                            <strong>${site.name}</strong> in <strong>${site.district} District</strong> has <strong>${site.trainers} trainers</strong> 
                            with <strong>${site.observations} total observations</strong>. The site average is 
                            <strong class="score-${getScoreColor(site.average)}">${site.average.toFixed(2)}/5.0</strong>, which is

                                ${site.average >= districtAvg ? (site.average - districtAvg).toFixed(2) + ' points above' : (districtAvg - site.average).toFixed(2) + ' points below'}
                            </strong> the district average.
                        </p>
                    </div>
                </div>
                
                ${highPerformers.length > 0 ? `
                    <div class="section">
                        <h3 class="section-title">💪 Site Strengths</h3>
                        <div class="insight-card strength">
                            <div class="insight-title strength">High-Performing Trainers</div>
                            <div class="insight-text">
                                ${highPerformers.length} trainer${highPerformers.length !== 1 ? 's' : ''} at this site 
                                ${highPerformers.length !== 1 ? 'are' : 'is'} performing at Model levels (>4.49):
                                <strong>${highPerformers.map(t => t.trainer_name).join(', ')}</strong>.
                                ${highPerformers.length > 1 ? 'These trainers can support others at the site.' : 'This trainer can serve as a model for others.'}
                            </div>
                        </div>
                        ${site.average >= districtAvg ? `
                            <div class="insight-card strength">
                                <div class="insight-title strength">Above District Average</div>
                                <div class="insight-text">
                                    This site is performing ${(site.average - districtAvg).toFixed(2)} points above the ${site.district} district average. 
                                    The collaborative environment and site-level practices are contributing to strong outcomes.
                                </div>
                            </div>
                        ` : ''}
                    </div>
                ` : ''}
                
                ${needsAttention.length > 0 ? `
                    <div class="section">
                        <h3 class="section-title">🎯 Focus Areas</h3>
                        <div class="insight-card warning">
                            <div class="insight-title warning">Trainers Needing Site-Level Support</div>
                            <div class="insight-text">
                                ${needsAttention.length} trainer${needsAttention.length !== 1 ? 's' : ''} at ${site.name} would benefit from 
                                additional coaching and peer support. Consider establishing site-based mentorship pairs.
                            </div>
                        </div>
                        ${needsAttention.map(t => `
                            <div style="padding: 12px; background: #7f1d1d20; border-radius: 8px; border-left: 4px solid #f59e0b; margin-bottom: 8px; cursor: pointer;" onclick="selectTrainer('${t.trainer_id}')">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <div>
                                        <div style="font-weight: 600;">${t.trainer_name}</div>
                                        <div style="font-size: 11px; color: #94a3b8; margin-top: 2px;">
                                            ${t.stats.observation_count} observations • ${t.stats.trend}
                                        </div>
                                    </div>
                                    <div class="score-${getScoreColor(t.stats.average_score)}" style="font-weight: bold; font-size: 18px;">
                                        ${t.stats.average_score.toFixed(2)}
                                    </div>
                                </div>
                            </div>

                    </div>
                ` : ''}
                
                <div class="section">

                    ${[

                                `Schedule peer observations between trainers at site`

                        },
                        {

                            priority: needsAttention.length > 0 ? 'IMMEDIATE' : 'ONGOING',

                                `Monitor for any emerging challenges`

                        }
                    ].map(plan => {

        // Generate AI analysis dynamically from trainer data
        function generateTrainerAnalysis(trainer) {
            const avgScore = trainer.stats.average_score;
            const trend = trainer.stats.trend;
            const obsCount = trainer.stats.observation_count;
            const comps = trainer.stats.competencies;
            
            // Determine urgency
            let urgency = 'monitoring';
            if (avgScore < 3.0 || (avgScore < 3.5 && trend === 'declining')) {
                urgency = 'immediate';
            } else if (avgScore < 3.5 || trend === 'declining') {
                urgency = 'short-term';
            }
            
            // Identify strengths (competencies >= 4.0)
            const strengths = [];
            Object.entries(comps).forEach(([name, score]) => {
                if (score >= 4.0) {
                    strengths.push(`Strong ${name} skills (${score.toFixed(1)}/5.0)`);
                }
            });
            
            if (trend === 'improving') {
                strengths.push(`Positive performance trend (${trend})`);
            }
            
            if (obsCount >= 8) {
                strengths.push(`Consistent participation (${obsCount} observations)`);
            }
            
            if (strengths.length === 0) {
                strengths.push('Showing commitment through regular attendance');
            }
            
            // Identify concerns (competencies < 3.5)
            const concerns = [];
            Object.entries(comps).forEach(([name, score]) => {
                if (score < 3.0) {
                    concerns.push(`${name} needs significant improvement (${score.toFixed(1)}/5.0) - HIGH PRIORITY`);
                } else if (score < 3.5) {
                    concerns.push(`${name} requires development (${score.toFixed(1)}/5.0) - MEDIUM PRIORITY`);
                }
            });
            
            if (trend === 'declining') {
                concerns.push('Performance declining over time - REQUIRES ATTENTION');
            }
            
            if (avgScore < 3.5) {
                concerns.push(`Overall performance below target (${avgScore.toFixed(2)}/5.0)`);
            }
            
            // Generate action plan
            const actionPlan = [];
            
            if (avgScore < 3.0) {
                actionPlan.push('IMMEDIATE: Schedule intensive one-on-one coaching session this week');
                actionPlan.push('Pair with high-performing mentor trainer for job shadowing');
                actionPlan.push('Conduct daily lesson plan reviews before sessions');
            } else if (avgScore < 3.5) {
                actionPlan.push('Schedule weekly coaching sessions for next 4 weeks');
                actionPlan.push('Focus on lowest-scoring competencies through targeted practice');
                actionPlan.push('Observe high-performing trainers in action');
            } else if (avgScore >= 4.5) {
                actionPlan.push('Leverage as peer mentor for developing trainers');
                actionPlan.push('Consider for leadership development opportunities');
                actionPlan.push('Share best practices in trainer meetings');
            } else {
                actionPlan.push('Continue regular observation and feedback cycle');
                actionPlan.push('Strengthen specific competency areas identified above');
                actionPlan.push('Encourage peer learning and collaboration');
            }
            
            // Add competency-specific actions
            const lowestComp = Object.entries(comps).sort((a, b) => a[1] - b[1])[0];
            if (lowestComp && lowestComp[1] < 4.0) {
                actionPlan.push(`Targeted development: ${lowestComp[0]} through focused workshops`);
            }
            
            return {
                urgency,
                strengths,
                concerns: concerns.length > 0 ? concerns : ['Maintain current performance standards'],
                actionPlan
            };
        }
